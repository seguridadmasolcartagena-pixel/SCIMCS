<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MASOL PCI — Calibrador de Pins</title>
<script src="map_b64.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: monospace; background: #0d1117; color: #e6edf3; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

#toolbar {
  background: #161b22; border-bottom: 1px solid #30363d;
  padding: 10px 16px; display: flex; align-items: center; gap: 12px; flex-shrink: 0; flex-wrap: wrap;
}
#toolbar h1 { font-size: 14px; color: #f0883e; font-weight: bold; margin-right: 8px; }
#valve-select { background: #21262d; border: 1px solid #30363d; color: #e6edf3; padding: 6px 10px; border-radius: 6px; font-size: 13px; min-width: 180px; }
#pos-display { background: #21262d; padding: 6px 12px; border-radius: 6px; font-size: 12px; color: #79c0ff; min-width: 160px; }
#btn-export { background: #238636; border: none; color: white; padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
#btn-export:hover { background: #2ea043; }
#btn-reset { background: #da3633; border: none; color: white; padding: 7px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
#instructions { font-size: 11px; color: #8b949e; }
#status { font-size: 11px; padding: 4px 10px; border-radius: 4px; }
#status.ok { background: rgba(35,134,54,0.2); color: #56d364; border: 1px solid #238636; }
#status.info { background: rgba(33,139,255,0.1); color: #79c0ff; border: 1px solid #1f6feb; }

#map-area { flex: 1; overflow: hidden; position: relative; background: #010409; }
#map-viewport { width: 100%; height: 100%; overflow: hidden; position: relative; touch-action: none; }
#map-container { position: absolute; top: 0; left: 0; transform-origin: 0 0; cursor: crosshair; }
#map-img { display: block; max-width: none; pointer-events: none; user-select: none; }
#pins-layer { position: absolute; top: 0; left: 0; pointer-events: none; }

.pin {
  position: absolute; transform: translate(-50%, -50%);
  width: 24px; height: 24px; border-radius: 50%;
  border: 2.5px solid white; cursor: grab;
  display: flex; align-items: center; justify-content: center;
  font-size: 7px; font-weight: bold; color: white;
  box-shadow: 0 2px 8px rgba(0,0,0,0.6);
  pointer-events: all; transition: transform 0.1s;
  user-select: none;
}
.pin:hover { transform: translate(-50%,-50%) scale(1.3); z-index: 100; }
.pin.active { transform: translate(-50%,-50%) scale(1.4); border-color: #f0883e; z-index: 200; box-shadow: 0 0 0 4px rgba(240,136,62,0.4); }
.pin.vh { background: #1B3480; }
.pin.vs { background: #00963F; }
.pin.vpc { background: #7030a0; }
.pin.cb { background: #B8920A; }
.pin-label { position: absolute; top: 100%; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); color: white; font-size: 9px; padding: 2px 5px; border-radius: 3px; white-space: nowrap; margin-top: 3px; pointer-events: none; }

#zoom-bar { position: absolute; bottom: 12px; right: 12px; display: flex; gap: 6px; z-index: 50; }
.zoom-btn { background: rgba(22,27,34,0.9); border: 1px solid #30363d; color: #e6edf3; width: 36px; height: 36px; border-radius: 8px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.zoom-btn:hover { background: rgba(33,99,255,0.3); }

#export-modal {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85);
  z-index: 1000; align-items: center; justify-content: center;
}
#export-modal.open { display: flex; }
#export-box {
  background: #161b22; border: 1px solid #30363d; border-radius: 12px;
  padding: 20px; width: 90%; max-width: 700px; max-height: 85vh;
  display: flex; flex-direction: column; gap: 12px;
}
#export-box h2 { font-size: 15px; color: #f0883e; }
#export-box p { font-size: 12px; color: #8b949e; }
#export-text { flex: 1; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; padding: 12px; font-family: monospace; font-size: 11px; color: #7ee787; resize: none; min-height: 300px; overflow-y: auto; }
#btn-copy { background: #238636; border: none; color: white; padding: 8px 20px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
#btn-close-modal { background: #21262d; border: 1px solid #30363d; color: #e6edf3; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; }
.modal-btns { display: flex; gap: 10px; }
</style>
</head>

<div id="toolbar">
  <h1>🎯 CALIBRADOR PCI</h1>
  <select id="valve-select" onchange="selectValveFromDropdown()">

  <div id="instructions">🖱 Rueda = zoom · Drag mapa = mover · Drag pin = reposicionar</div>
  <button id="btn-export" onclick="openExport()">📋 Exportar coordenadas</button>
  <button id="btn-reset" onclick="resetAll()">↺ Reset</button>
</div>

<div id="map-area">
  <div id="map-viewport">
    <div id="map-container">
      <img id="map-img" src="" alt="Plano" draggable="false">
      <div id="pins-layer"></div>
    </div>
  </div>
  <div id="zoom-bar">
    <button class="zoom-btn" onclick="zoomBy(0.7)">−</button>
    <button class="zoom-btn" onclick="zoomBy(1.4)">+</button>
    <button class="zoom-btn" onclick="fitMap()" title="Ajustar">⊡</button>
  </div>
</div>

<div id="export-modal">
  <div id="export-box">
    <h2>📋 Coordenadas actualizadas</h2>
    <p>Copia este bloque y pégalo en el <code>index.html</code> de la app, reemplazando el bloque <code>const VALVE_GROUPS</code> existente.</p>
    <textarea id="export-text" readonly></textarea>
    <div class="modal-btns">
      <button id="btn-copy" onclick="copyExport()">Copiar al portapapeles</button>
      <button id="btn-close-modal" onclick="closeExport()">Cerrar</button>
    </div>
  </div>
</div>

// ─── STATE ───
let scale = 1, mapX = 0, mapY = 0;
let imgW = 0, imgH = 0;
let activePinItem = null;
let draggingPin = false, draggingMap = false;
let dragStartX, dragStartY, dragStartMapX, dragStartMapY;

// Load saved positions from localStorage
function loadSaved() {
  const saved = localStorage.getItem('masol_calib');
  if (saved) {
    const positions = JSON.parse(saved);
    VALVES.forEach(v => {
      if (positions[v.item]) {
        v.mx = positions[v.item].mx;
        v.my = positions[v.item].my;
      }
    });
  }
}

function savePositions() {
  const out = {};
  VALVES.forEach(v => { out[v.item] = { mx: v.mx, my: v.my }; });
  localStorage.setItem('masol_calib', JSON.stringify(out));
}

// ─── INIT ───
window.addEventListener('load', () => {
  loadSaved();
  const img = document.getElementById('map-img');
  img.src = typeof MAP_IMAGE_B64 !== 'undefined' ? MAP_IMAGE_B64 : '';
  img.onload = () => {
    imgW = img.naturalWidth;
    imgH = img.naturalHeight;
    document.getElementById('pins-layer').style.width = imgW + 'px';
    document.getElementById('pins-layer').style.height = imgH + 'px';
    fitMap();
    renderPins();
    buildDropdown();
  };
  setupInteractions();
});

// ─── DROPDOWN ───
function buildDropdown() {
  const sel = document.getElementById('valve-select');
  VALVES.forEach(v => {
    const opt = document.createElement('option');
    opt.value = v.item;
    opt.textContent = v.item + ' — ' + (v.eq || v.t).substring(0, 35);
    sel.appendChild(opt);
  });
}

function selectValveFromDropdown() {
  const item = document.getElementById('valve-select').value;
  if (!item) return;
  selectPin(item);
  zoomToPin(item);
}

// ─── RENDER PINS ───
function renderPins() {
  const layer = document.getElementById('pins-layer');
  layer.innerHTML = '';
  VALVES.forEach(v => {
    const pin = document.createElement('div');
    pin.className = 'pin ' + v.g;
    pin.id = 'pin-' + v.item.replace(/[^a-z0-9]/gi, '_');
    pin.style.left = v.mx + '%';
    pin.style.top = v.my + '%';
    pin.dataset.item = v.item;

    // Short label
    const short = v.item.replace('VPC.','P').replace('VH.','H').replace('VS.','S')
                        .replace('V/V ','').replace(' ','').substring(0,4);
    pin.innerHTML = short + '<div class="pin-label">' + v.item + '</div>';

    pin.addEventListener('mousedown', e => startPinDrag(e, v));
    pin.addEventListener('touchstart', e => startPinDrag(e, v), {passive:false});
    pin.addEventListener('click', e => { e.stopPropagation(); selectPin(v.item); });
    layer.appendChild(pin);
  });
}

function updatePinPos(item) {
  const v = VALVES.find(x => x.item === item);
  if (!v) return;
  const id = 'pin-' + item.replace(/[^a-z0-9]/gi, '_');
  const pin = document.getElementById(id);
  if (pin) { pin.style.left = v.mx + '%'; pin.style.top = v.my + '%'; }
}

function selectPin(item) {
  document.querySelectorAll('.pin').forEach(p => p.classList.remove('active'));
  activePinItem = item;
  const id = 'pin-' + item.replace(/[^a-z0-9]/gi, '_');
  const pin = document.getElementById(id);
  if (pin) pin.classList.add('active');
  const v = VALVES.find(x => x.item === item);
  if (v) updateDisplay(v.mx, v.my);
  document.getElementById('valve-select').value = item;
}

function updateDisplay(mx, my) {
  document.getElementById('pos-display').textContent = 'x: ' + mx.toFixed(2) + '%  y: ' + my.toFixed(2) + '%';
}

// ─── PIN DRAG ───
function startPinDrag(e, v) {
  e.stopPropagation();
  e.preventDefault();
  selectPin(v.item);
  draggingPin = true;

  const getClientXY = e => e.touches ? [e.touches[0].clientX, e.touches[0].clientY] : [e.clientX, e.clientY];

  const onMove = e => {
    if (!draggingPin) return;
    const [cx, cy] = getClientXY(e);
    const vp = document.getElementById('map-viewport');
    const rect = vp.getBoundingClientRect();
    // Convert screen position to image percentage
    const imgPixelX = (cx - rect.left - mapX) / scale;
    const imgPixelY = (cy - rect.top  - mapY) / scale;
    v.mx = Math.max(0, Math.min(100, imgPixelX / imgW * 100));
    v.my = Math.max(0, Math.min(100, imgPixelY / imgH * 100));
    updatePinPos(v.item);
    updateDisplay(v.mx, v.my);
  };

  const onUp = () => {
    draggingPin = false;
    savePositions();
    showStatus('✓ ' + v.item + ' guardado', 'ok');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('touchend', onUp);
  };

  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
  document.addEventListener('touchmove', onMove, {passive:false});
  document.addEventListener('touchend', onUp);
}

// ─── MAP PAN/ZOOM ───
function fitMap() {
  const vp = document.getElementById('map-viewport');
  const vpW = vp.clientWidth, vpH = vp.clientHeight;
  scale = vpW / imgW;
  mapX = 0; mapY = 0;
  applyTransform();
}

function zoomBy(factor) {
  const vp = document.getElementById('map-viewport');
  const cx = vp.clientWidth / 2, cy = vp.clientHeight / 2;
  mapX = (mapX - cx) * factor + cx;
  mapY = (mapY - cy) * factor + cy;
  scale *= factor;
  clamp();
  applyTransform();
}

function zoomToPin(item) {
  const v = VALVES.find(x => x.item === item);
  if (!v) return;
  const vp = document.getElementById('map-viewport');
  const vpW = vp.clientWidth, vpH = vp.clientHeight;
  const targetScale = Math.max(scale, vpW / imgW * 3);
  const pinImgX = v.mx / 100 * imgW;
  const pinImgY = v.my / 100 * imgH;
  scale = targetScale;
  mapX = vpW / 2 - pinImgX * scale;
  mapY = vpH / 2 - pinImgY * scale;
  clamp();
  const c = document.getElementById('map-container');
  c.style.transition = 'transform 0.4s ease';
  applyTransform();
  setTimeout(() => c.style.transition = '', 450);
}

function clamp() {
  const vp = document.getElementById('map-viewport');
  const minScale = vp.clientWidth / imgW;
  scale = Math.max(minScale * 0.9, Math.min(scale, 10));
  const sw = imgW * scale, sh = imgH * scale;
  mapX = Math.min(0, Math.max(vp.clientWidth - sw, mapX));
  mapY = Math.min(0, Math.max(vp.clientHeight - sh, mapY));
}

function applyTransform() {
  document.getElementById('map-container').style.transform = `translate(${mapX}px,${mapY}px) scale(${scale})`;
}

function setupInteractions() {
  const vp = document.getElementById('map-viewport');

  // Mouse pan
  let mdx, mdy, mmx, mmy;
  vp.addEventListener('mousedown', e => {
    if (draggingPin) return;
    draggingMap = true;
    mdx = e.clientX; mdy = e.clientY; mmx = mapX; mmy = mapY;
  });
  window.addEventListener('mousemove', e => {
    if (!draggingMap || draggingPin) return;
    mapX = mmx + (e.clientX - mdx);
    mapY = mmy + (e.clientY - mdy);
    clamp(); applyTransform();
  });
  window.addEventListener('mouseup', () => { draggingMap = false; });

  // Mouse wheel zoom
  vp.addEventListener('wheel', e => {
    e.preventDefault();
    const f = e.deltaY < 0 ? 1.15 : 0.87;
    const rect = vp.getBoundingClientRect();
    const cx = e.clientX - rect.left, cy = e.clientY - rect.top;
    mapX = (mapX - cx) * f + cx;
    mapY = (mapY - cy) * f + cy;
    scale *= f;
    clamp(); applyTransform();
  }, {passive: false});

  // Touch pan/zoom
  let lastTouches = null, lastDist = 0, tmx, tmy, tsx, tsy;
  vp.addEventListener('touchstart', e => {
    if (e.touches.length === 1 && !draggingPin) {
      draggingMap = true;
      tsx = e.touches[0].clientX; tsy = e.touches[0].clientY; tmx = mapX; tmy = mapY;
    } else if (e.touches.length === 2) {
      draggingMap = false;
      lastDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    }
    e.preventDefault();
  }, {passive:false});

  vp.addEventListener('touchmove', e => {
    if (e.touches.length === 1 && draggingMap) {
      mapX = tmx + (e.touches[0].clientX - tsx);
      mapY = tmy + (e.touches[0].clientY - tsy);
      clamp(); applyTransform();
    } else if (e.touches.length === 2) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const f = dist / lastDist;
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const rect = vp.getBoundingClientRect();
      const lcx = cx - rect.left, lcy = cy - rect.top;
      mapX = (mapX - lcx) * f + lcx;
      mapY = (mapY - lcy) * f + lcy;
      scale *= f; lastDist = dist;
      clamp(); applyTransform();
    }
    e.preventDefault();
  }, {passive:false});
  vp.addEventListener('touchend', () => { draggingMap = false; });
}

// ─── STATUS ───
let statusTimer;
function showStatus(msg, type) {
  const s = document.getElementById('status');
  s.textContent = msg; s.className = 'status ' + type;
  clearTimeout(statusTimer);
  statusTimer = setTimeout(() => { s.textContent = 'Arrastra los pins para posicionarlos'; s.className = 'status info'; }, 2500);
}

// ─── EXPORT ───
function openExport() {
  const lines = [];
  lines.push('const VALVE_GROUPS = [');
  
  const groups = [
    { id:'vh', name:'VÁLVULAS CORTE HIDRANTE' },
    { id:'vs', name:'VÁLVULAS SECCIONAMIENTO RED AGUA CI' },
    { id:'vpc', name:'VÁLVULAS CORTE PUESTOS DE CONTROL' },
    { id:'cb', name:'VÁLVULAS CASETA DE BOMBAS CI' },
  ];

  groups.forEach((grp, gi) => {
    lines.push(`  { id:'${grp.id}', name:'${grp.name}', valves:[`);
    const gValves = VALVES.filter(v => v.g === grp.id);
    gValves.forEach((v, vi) => {
      const comma = vi < gValves.length - 1 ? ',' : '';
      const nVal = typeof v.n === 'number' ? v.n : (v.n === '' ? "''" : v.n);
      const obsStr = v.obs ? `, obs:'${v.obs}'` : '';
      const mx = v.mx.toFixed(2);
      const my = v.my.toFixed(2);
      lines.push(`    {n:${nVal}, p:'${v.p}', item:'${v.item}', eq:'${v.eq}', t:'${v.t}', pos:'${v.pos}', mx:${mx}, my:${my}${obsStr}}${comma}`);
    });
    const grpComma = gi < groups.length - 1 ? ',' : '';
    lines.push(`  ]}${grpComma}`);
  });
  lines.push('];');

  document.getElementById('export-text').value = lines.join('\n');
  document.getElementById('export-modal').classList.add('open');
}

function closeExport() {
  document.getElementById('export-modal').classList.remove('open');
}

function copyExport() {
  const txt = document.getElementById('export-text');
  txt.select();
  document.execCommand('copy');
  document.getElementById('btn-copy').textContent = '✓ Copiado!';
  setTimeout(() => document.getElementById('btn-copy').textContent = 'Copiar al portapapeles', 2000);
}

function resetAll() {
  if (!confirm('¿Borrar todas las posiciones guardadas y volver a las originales?')) return;
  localStorage.removeItem('masol_calib');
  location.reload();
}
